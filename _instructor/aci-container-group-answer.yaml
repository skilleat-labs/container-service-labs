# =============================================
# ACI 컨테이너 그룹 도전과제 — 강사용 정답
# 배포 금지 / 수강생 공유 금지
# =============================================

apiVersion: 2019-12-01
name: miniblog-group
properties:
  containers:
  - name: backend
    properties:
      image: skilleat/backend:v4-kb5
      resources:
        requests:
          cpu: 0.5
          memoryInGB: 0.5

  - name: frontend
    properties:
      image: skilleat/frontend:v4-kb5
      resources:
        requests:
          cpu: 0.5
          memoryInGB: 0.5
      ports:
      - port: 8080

  osType: Linux
  ipAddress:
    type: Public
    ports:
    - protocol: tcp
      port: 8080

# =============================================
# 배포 명령
# =============================================
#
#   az container create \
#     --resource-group <본인_리소스_그룹> \
#     --file ~/container-group.yaml
#
# 접속 확인
#   az container show \
#     --resource-group <본인_리소스_그룹> \
#     --name miniblog-group \
#     --query ipAddress.ip -o tsv
#
# 브라우저: http://<공용IP>:8080
#
# =============================================
# ⚠️  주의: 이미지 내부 Nginx 설정 확인 필요
# =============================================
#
# frontend 이미지의 Nginx가 backend를
# "backend-service:5000" 으로 바라보고 있다면
# ACI에서는 "localhost:5000" 으로 변경된 이미지가 필요.
#
# Docker Compose → 서비스 이름으로 통신
# ACI 컨테이너 그룹 → localhost 로 통신
#
# 현재 이미지(v4-kb5)가 localhost를 바라보는지
# 직접 확인 후 수강생 가이드에 반영할 것.
#
# =============================================
# 삭제 명령
# =============================================
#
#   az container delete \
#     --resource-group <본인_리소스_그룹> \
#     --name miniblog-group \
#     --yes
